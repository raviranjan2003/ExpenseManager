name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --------------------
      # FRONTEND BUILD
      # --------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # --------------------
      # BACKEND PREP
      # --------------------
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install --production

      # --------------------
      # DEPLOY VIA SCP + SSH
      # --------------------
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: |
            frontend/dist/*
            backend/*
          target: ${{ secrets.APP_DIR }}

      - name: SSH and Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # APP_DIR should be something like /var/www/app
            # scp-action will place files under:
            #   $APP_DIR/frontend/dist/*
            #   $APP_DIR/backend/*
            cd "${{ secrets.APP_DIR }}"

            # Refresh frontend serving directory
            rm -rf /var/www/frontend/*
            cp -r frontend/dist/* /var/www/frontend/

            # Refresh backend directory
            rm -rf /var/www/backend/*
            cp -r backend/* /var/www/backend/

            cd /var/www/backend

            pm2 delete app || true
            pm2 start server.js --name app
            pm2 save