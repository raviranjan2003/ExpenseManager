name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout code
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Setup Node.js
      # ----------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ----------------------------
      # Build Frontend
      # ----------------------------
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # ----------------------------
      # Prepare Backend
      # ----------------------------
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install --production

      - name: Debug build output
        run: |
          echo "Listing Frontend build output:"
          ls -la frontend/dist || echo "No build output"

          echo "Listing backend directory:"
          ls -la backend || echo "No backend directory"

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "SSH connection successful"

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST is missing"; else echo "EC2_HOST OK"; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER is missing"; else echo "EC2_USER OK"; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "EC2_SSH_KEY is missing"; else echo "EC2_SSH_KEY OK"; fi

      # ----------------------------
      # Copy files to EC2
      # ----------------------------
      #- name: Copy files to EC2 via SCP
      #  uses: appleboy/scp-action@v0.1.7
       # with:
        #  host: ${{ secrets.EC2_HOST }}
         # username: ${{ secrets.EC2_USER }}
         # key: ${{ secrets.EC2_SSH_KEY }}
         # source: |
         #   frontend/dist
         #   backend
         # target: /var/www
      - name: Copy frontend build output to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: |
            frontend/dist
          target: /var/www/frontend/
          strip_components: 2
        
      - name: Copy backend files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: |
            backend/*
          target: /var/www/backend/
          strip_components: 1
      # ----------------------------
      # Deploy on EC2
      # ----------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Starting deployment..." 
            
            # FRONTEND SETUP 
            # Move build output to final location 
            if [ -d "/var/www/frontend/dist" ]; then 
              cp -r /var/www/frontend/dist/* /var/www/frontend/ || true 
              rm -rf /var/www/frontend/dist 
            fi 
            
            if [ -d "/var/www/frontend/build" ]; then 
              cp -r /var/www/frontend/build/* /var/www/frontend/ || true 
              rm -rf /var/www/frontend/build 
            fi 
            
            echo "Checking frontend files..."
            ls -la /var/www/frontend/frontend/dist

            echo "Checking backend files..."
            ls -la /var/www/backend

            # BACKEND SETUP 
            cd /var/www/backend 
            if [ ! -f "package.json" ]; then
              echo "package.json not found in backend directory"
              exit 1
            fi
            npm install --production 
            
            # Restart backend with PM2 
            if [ ! -f "server.js" ]; then
              echo "server.js not found in backend directory"
              exit 1
            fi
            pm2 delete app || true 
            pm2 start server.js --name app 
            pm2 save 
            echo "Deployment completed successfully"
